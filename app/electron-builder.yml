appId: com.openclaude.app
productName: OpenClaude
directories:
  buildResources: build
npmRebuild: true
nodeGypRebuild: false
buildDependenciesFromSource: false
files:
  - dist
  - dist-electron
  - package.json
  - "!node_modules/@shipany/open-agent-sdk/src/**"
  - "!node_modules/**/{test,tests,__tests__,docs,example,examples}/**"
  - "!node_modules/**/*.{ts,tsx,map,md}"
asar: true
asarUnpack:
  - "node_modules/@shipany/open-agent-sdk/**"
mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.developer-tools
